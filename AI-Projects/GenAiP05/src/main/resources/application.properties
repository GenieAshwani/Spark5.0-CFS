spring.application.name=GenAiP05
logging.pattern.console=%yellow(%d{HH:mm:ss.SSS}) %blue(%-5level) %red([%thread]) %green(%logger{36}) %yellow(:%line) -%msg%n
server.port=8080

spring.ai.openai.api-key=${OPEN_API_KEY}

logging.level.org.springframework.ai.chat.client.advisor=DEBUG

# H2 Database Configuration
spring.datasource.url=jdbc:h2:file:./data/chatmemorydb;AUTO_SERVER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=123

# Enable H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.ai.chat.memory.repository.jdbc.initialize-schema=ALWAYS
spring.ai.chat.memory.repository.jdbc.platform=h2